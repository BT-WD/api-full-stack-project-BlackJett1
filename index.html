<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>API Full Stack Project</title>

    <!-- Link to CSS -->
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="container">

      <!-- New Dish Button -->
      <button id="new-dish-btn">New Dish</button>

      <!-- Dish Name -->
      <h1 id="dish-name">Name of Dish</h1>

      <!-- Image Placeholder -->
      <div id="image-container">
        <img id="dish-image" src="" alt="Dish Image" />
        <p class="placeholder-text">Image</p>
      </div>

      <!-- Ingredients Section -->
      <div id="ingredients-section">
        <h2>Ingredients:</h2>
        <ul id="ingredients-list">
          <!-- Static placeholder items -->
          <li>Ingredient 1</li>
          <li>Ingredient 2</li>
          <li>Ingredient 3</li>
        </ul>
      </div>

      <!-- Instructions Section -->
      <div id="instructions-section">
        <h2>Instructions:</h2>
        <p id="instructions-text">
          Step-by-step cooking instructions will appear here.
        </p>
      </div>

      <!-- Placeholder for API data -->
      <div id="data-container"></div>

    </div>
  </body>
</html>
